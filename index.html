// ===== UNLIMITED IMAGE STORAGE (IndexedDB Architecture) =====
let db = null;
function initIndexedDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open('CineOpsDB', 1);
    request.onupgradeneeded = (e) => {
      let database = e.target.result;
      if (!database.objectStoreNames.contains('gallery')) {
        database.createObjectStore('gallery', { keyPath: 'id', autoIncrement: true });
      }
    };
    request.onsuccess = (e) => { db = e.target.result; resolve(); };
    request.onerror = (e) => { console.error('IndexedDB Error', e); reject(e); };
  });
}

function saveImageToDB(pid, fileData, fileName) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(['gallery'], 'readwrite');
    const store = transaction.objectStore('gallery');
    const record = { pid: pid, src: fileData, name: fileName, timestamp: Date.now() };
    const req = store.add(record);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e);
  });
}

function getImagesFromDB(pid) {
  return new Promise((resolve) => {
    const transaction = db.transaction(['gallery'], 'readonly');
    const store = transaction.objectStore('gallery');
    const req = store.getAll();
    req.onsuccess = () => {
      const filtered = req.result.filter(img => img.pid === pid);
      resolve(filtered);
    };
  });
}

function deleteImageFromDB(id) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(['gallery'], 'readwrite');
    const store = transaction.objectStore('gallery');
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e);
  });
}

function cleanString(str) {
  return str.toLowerCase()
    .replace(/[.,\/#!$%\^&\*;:{}=\-_~()?]/g,"")
    .replace(/ü/g,'ue').replace(/ö/g,'oe').replace(/ä/g,'ae').replace(/ß/g,'ss');
}

function generateAnswer(question) {
  const cleanQ = cleanString(question);
  const qTokens = cleanQ.split(/\s+/).filter(t => t.length > 2);
  
  let bestTopic = null;
  let maxScore = 0;

  for (const [topic, data] of Object.entries(KB)) {
    let score = 0;
    for (const key of data.keys) {
      const cleanKey = cleanString(key);
      if (cleanQ.includes(cleanKey)) { score += 5; }
      for (const token of qTokens) {
        if (token.startsWith(cleanKey) || cleanKey.startsWith(token)) { score += 2; }
      }
    }
    if (score > maxScore) { maxScore = score; bestTopic = data; }
  }

  if (maxScore >= 3 && bestTopic) return bestTopic.answer;

  return `Ich konnte deine Frage lokal nicht eindeutig zuordnen. \n\n**Bitte verwende Fachbegriffe aus dem Handbuch:**\n- *MMT Scanner, RetroScan, Film-Digital*\n- *Super 8, 16mm, 9.5mm, Nitrate*\n- *Vinegar Syndrome, Schimmel, Magnetton, AEO-Light*`;
}

        <button onclick="stopCineTimer()" style="background:var(--red); color:#fff; border:none; padding:0.3rem 0.7rem; border-radius:4px; cursor:pointer; font-weight:600; font-size:0.75rem;">STOP</button>
        <button onclick="resetCineTimer()" style="background:transparent; color:var(--text-dim); border:none; padding:0.3rem 0.5rem; cursor:pointer; font-size:0.75rem;">RESET</button>
      </div>
      <div id="cine-timer-laps" style="flex:1; display:flex; gap:0.75rem; overflow-x:auto; white-space:nowrap; font-size:0.75rem; color:var(--text-mid);"></div>
    </div>
  `;
  const mainContainer = document.querySelector('.main');
  if (mainContainer) {
    mainContainer.insertAdjacentHTML('afterbegin', timerHTML);
  }
}

function startCineTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timerSeconds++;
    let hrs = Math.floor(timerSeconds / 3600).toString().padStart(2, '0');
    let mins = Math.floor((timerSeconds % 3600) / 60).toString().padStart(2, '0');
    let secs = (timerSeconds % 60).toString().padStart(2, '0');
    document.getElementById('cine-timer-display').textContent = hrs + ':' + mins + ':' + secs;
  }, 1000);
}

function stopCineTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function lapCineTimer() {
  if (!timerInterval) return;
  const currentDisplay = document.getElementById('cine-timer-display').textContent;
  timerLaps.unshift(currentDisplay);
  timerLaps = timerLaps.slice(0, 4);
  const lapsContainer = document.getElementById('cine-timer-laps');
  lapsContainer.innerHTML = timerLaps.map((l, idx) => '<span style="background:var(--surface2); padding:0.15rem 0.4rem; border-radius:3px; border:1px solid var(--border);">L' + (timerLaps.length - idx) + ': ' + l + '</span>').join('');
}

function resetCineTimer() {
  stopCineTimer();
  timerSeconds = 0;
  timerLaps = [];
  document.getElementById('cine-timer-display').textContent = "00:00:00";
  document.getElementById('cine-timer-laps').innerHTML = "";
}

// ===== UI NAVIGATION CONTROL WITH DYNAMIC WIDGET INJECTION =====
function showView(view, pushHistory = true) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  const chatArea = document.getElementById('view-chat');
  const inputArea = document.getElementById('input-area');
  document.querySelectorAll('.wiki-panel').forEach(p => p.classList.remove('active'));

  if (view === 'chat') {
    chatArea.classList.remove('hidden');
    inputArea.style.display = '';
  } else {
    chatArea.classList.add('hidden');
    inputArea.style.display = 'none';
    
    const activePanel = document.getElementById('view-' + view);
    if (activePanel) {
      activePanel.classList.add('active');
      injectInteractiveWidgets(activePanel, view);
      renderImgGrid(view); 
      loadNoteForView(view);
    }
  }

  document.querySelectorAll('.sidebar-item').forEach(item => {
    if ((item.getAttribute('onclick') || '').includes("'" + view + "'")) item.classList.add('active');
  });

  if (pushHistory && viewHistory[viewHistory.length - 1] !== view) viewHistory.push(view);
  document.getElementById('back-btn').style.display = (view !== 'chat') ? 'flex' : 'none';
  addToRecent(view);
  closeSidebar();
  currentView = view;
}

function filterSidebar(query) {

  let anyVisible = false;
  document.querySelectorAll('.sidebar-item').forEach(item => {
    const text = (item.textContent + ' ' + (item.dataset.search || '')).toLowerCase();

// ===== CHAT INTERFACE =====
function askQuestion(q) { document.getElementById('chat-input').value = q; sendMessage(); }
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  if(document.querySelector('.welcome')) document.querySelector('.welcome').style.display = 'none';

  appendMessage('user', text);
  const typingEl = appendTyping();
  isLoading = true;

  try {
    await new Promise(r => setTimeout(r, 500));
    const reply = generateAnswer(text);
    typingEl.remove();
    appendMessage('assistant', reply);
  } catch (err) {
    typingEl.remove();
    appendMessage('assistant', '⚠️ Ein Fehler ist im lokalen Engine aufgetreten.');
  }
  isLoading = false;
}

function appendMessage(role, text) {
  const area = document.getElementById('view-chat');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = '<div class="avatar ' + (role === 'user' ? 'user-av' : 'ai-av') + '">' + (role === 'user' ? 'DU' : '🎞') + '</div><div class="bubble">' + formatText(text) + '</div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function appendTyping() {
  const area = document.getElementById('view-chat');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="avatar ai-av">🎞</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function formatText(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/\n/g, '<br>');
}

// ===== WIZARD AUTOMATION =====
let wizardAnswers = {};
function wizardNext(step, answer) {
  wizardAnswers[step] = answer;
  document.getElementById('wd' + (step-1)).classList.add('done');
  if (step === 1) {
    if (answer === '35mm' || answer === '9.5mm') { showWizardResult(answer); return; }
    document.getElementById('ws1').classList.remove('active');
    document.getElementById('ws2').classList.add('active');
  } else if (step === 2) {
    document.getElementById('ws2').classList.remove('active');
    if (answer.startsWith('sound-')) { showWizardResult(wizardAnswers[1] + '+' + answer); } 
    else { document.getElementById('ws3').classList.add('active'); }
  } else if (step === 3) {
    document.getElementById('ws3').classList.remove('active');
    showWizardResult(wizardAnswers[1] + '+' + wizardAnswers[2] + '+' + answer);
  }
}

    '8mm+sound-mag': { m: 'Film-Digital FD2', i: '⚡', desc: 'Super 8 Magnetton-Rollen zwingend über FD2 einlesen. Staub/Shedding überwachen!' },
    '8mm+silent+good': { m: 'MMT Scanner', i: '🎞️', desc: 'Stummer 8mm Film in gutem Zustand bringt auf dem MMT bis zu 5.5K Premium-Qualität.' },

function wizardRestart() {
  wizardAnswers = {};
  ['ws1','ws2','ws3','ws-result'].forEach(id => document.getElementById(id)?.classList.remove('active'));

}

function renderFavourites() {

function updateFavButtons() {

function renderRecent() {

// ===== ASYNCHRONOUS TARGETED IMAGE MANAGEMENT =====
function toggleImgMgr(pid) { document.getElementById('imgmgr-body-' + pid)?.classList.toggle('open'); }

async function handleImgDrop(e, pid) {
  e.preventDefault();
  document.getElementById('imgdrop-' + pid)?.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  for (let f of files) { await processAndStoreImage(f, pid); }
}

async function processAndStoreImage(file, pid) {
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      await saveImageToDB(pid, e.target.result, file.name);
      renderImgGrid(pid);
      showToast('📸 Foto isoliert für dieses Thema gespeichert!');
    } catch (err) {
      showToast('⚠️ Datenbank-Schreibfehler.');
    }
  };
  reader.readAsDataURL(file);
}

async function renderImgGrid(pid) {
  const grid = document.getElementById('imgrid-' + pid);
  const countEl = document.getElementById('imgmgr-count-' + pid);
  if (!grid) return;
  
  const imgs = await getImagesFromDB(pid);
  if (countEl) countEl.textContent = imgs.length ? imgs.length + ' Foto' + (imgs.length > 1 ? 's' : '') : 'Keine Fotos';
  
  grid.innerHTML = imgs.map(img => `
    <div class="img-thumb">
      <img src="${img.src}" alt="${img.name}" onclick="openImgFull('${img.src}')">
      <button class="img-del" onclick="deleteImageEvent('${pid}', ${img.id})">✕</button>
      <div class="img-caption">${img.name}</div>
    </div>`).join('');
}

async function deleteImageEvent(pid, id) {
  await deleteImageFromDB(id);
  renderImgGrid(pid);
  showToast('🗑️ Foto gelöscht.');
}

function openImgFull(src) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  overlay.innerHTML = '<img src="' + src + '" style="max-width:95vw; max-height:92vh; border-radius:8px; object-fit:contain;">';
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

function initFileUploadGlobal() {
  let fileInp = document.getElementById('img-file-input');
  if (!fileInp) {
    fileInp = document.createElement('input');
    fileInp.type = 'file';
    fileInp.id = 'img-file-input';
    fileInp.accept = 'image/*';
    fileInp.multiple = true;
    fileInp.style.display = 'none';
    document.body.appendChild(fileInp);
  }
  
  fileInp.onchange = async function() {
    const pid = this.dataset.panel;
    if (!pid) return;
    for (let f of this.files) { await processAndStoreImage(f, pid); }
    this.value = ''; 
  };
}
